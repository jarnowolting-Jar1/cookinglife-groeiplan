<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" fill="none">
  <!-- Background -->
  <rect width="600" height="500" rx="16" fill="#f9fafb"/>

  <!-- Subtle grid pattern -->
  <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
    <circle cx="10" cy="10" r="0.8" fill="#e5e7eb"/>
  </pattern>
  <rect width="600" height="500" fill="url(#dots)" rx="16"/>

  <!-- "Ergonomisch" label top -->
  <rect x="200" y="20" width="200" height="28" rx="14" fill="#8EC760"/>
  <text x="300" y="39" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#fff" letter-spacing="1">ERGONOMISCH BESTEK</text>

  <!-- === FORK (left) === -->
  <g transform="translate(130, 70)">
    <!-- Fork tines - rounded -->
    <rect x="28" y="0" width="8" height="70" rx="4" fill="#b0b8c4"/>
    <rect x="44" y="0" width="8" height="70" rx="4" fill="#b0b8c4"/>
    <rect x="60" y="0" width="8" height="70" rx="4" fill="#b0b8c4"/>
    <!-- Fork neck -->
    <rect x="30" y="65" width="38" height="40" rx="4" fill="#c9cfd8"/>
    <!-- Fork handle connector -->
    <rect x="26" y="100" width="46" height="15" rx="7" fill="#9ca3af"/>
    <!-- Silicone handle - thick, short, green -->
    <rect x="18" y="110" width="62" height="120" rx="31" fill="#8EC760"/>
    <!-- Handle grip texture lines -->
    <line x1="30" y1="135" x2="68" y2="135" stroke="#7ab854" stroke-width="2" stroke-linecap="round"/>
    <line x1="30" y1="150" x2="68" y2="150" stroke="#7ab854" stroke-width="2" stroke-linecap="round"/>
    <line x1="30" y1="165" x2="68" y2="165" stroke="#7ab854" stroke-width="2" stroke-linecap="round"/>
    <line x1="30" y1="180" x2="68" y2="180" stroke="#7ab854" stroke-width="2" stroke-linecap="round"/>
    <line x1="30" y1="195" x2="68" y2="195" stroke="#7ab854" stroke-width="2" stroke-linecap="round"/>
    <!-- Handle highlight -->
    <rect x="24" y="120" width="12" height="100" rx="6" fill="#a1d87a" opacity="0.5"/>
  </g>

  <!-- === SPOON (center) === -->
  <g transform="translate(252, 70)">
    <!-- Spoon bowl - shallow -->
    <ellipse cx="48" cy="30" rx="35" ry="22" fill="#c9cfd8"/>
    <ellipse cx="48" cy="28" rx="28" ry="15" fill="#dde1e7"/>
    <!-- Shallow indicator -->
    <text x="48" y="33" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#9ca3af">ondiep</text>
    <!-- Spoon neck -->
    <rect x="38" y="48" width="20" height="55" rx="4" fill="#c9cfd8"/>
    <!-- Handle connector -->
    <rect x="26" y="100" width="46" height="15" rx="7" fill="#9ca3af"/>
    <!-- Silicone handle - thick, short, blue -->
    <rect x="18" y="110" width="62" height="120" rx="31" fill="#60a5fa"/>
    <!-- Handle grip texture -->
    <line x1="30" y1="135" x2="68" y2="135" stroke="#4a93e8" stroke-width="2" stroke-linecap="round"/>
    <line x1="30" y1="150" x2="68" y2="150" stroke="#4a93e8" stroke-width="2" stroke-linecap="round"/>
    <line x1="30" y1="165" x2="68" y2="165" stroke="#4a93e8" stroke-width="2" stroke-linecap="round"/>
    <line x1="30" y1="180" x2="68" y2="180" stroke="#4a93e8" stroke-width="2" stroke-linecap="round"/>
    <line x1="30" y1="195" x2="68" y2="195" stroke="#4a93e8" stroke-width="2" stroke-linecap="round"/>
    <!-- Handle highlight -->
    <rect x="24" y="120" width="12" height="100" rx="6" fill="#93c5fd" opacity="0.5"/>
  </g>

  <!-- === KNIFE (right) === -->
  <g transform="translate(380, 70)">
    <!-- Knife blade - rounded tip -->
    <path d="M48 0 C65 0 70 10 70 20 L70 80 C70 88 65 95 58 95 L38 95 C38 95 38 50 38 20 C38 8 42 0 48 0Z" fill="#c9cfd8"/>
    <!-- Blade edge (slightly darker) -->
    <path d="M62 10 L62 85" stroke="#b0b8c4" stroke-width="1.5"/>
    <!-- Rounded tip indicator -->
    <text x="54" y="15" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7" fill="#9ca3af">rond</text>
    <!-- Handle connector -->
    <rect x="26" y="100" width="46" height="15" rx="7" fill="#9ca3af"/>
    <!-- Silicone handle - thick, short, pink -->
    <rect x="18" y="110" width="62" height="120" rx="31" fill="#f472b6"/>
    <!-- Handle grip texture -->
    <line x1="30" y1="135" x2="68" y2="135" stroke="#e05da3" stroke-width="2" stroke-linecap="round"/>
    <line x1="30" y1="150" x2="68" y2="150" stroke="#e05da3" stroke-width="2" stroke-linecap="round"/>
    <line x1="30" y1="165" x2="68" y2="165" stroke="#e05da3" stroke-width="2" stroke-linecap="round"/>
    <line x1="30" y1="180" x2="68" y2="180" stroke="#e05da3" stroke-width="2" stroke-linecap="round"/>
    <line x1="30" y1="195" x2="68" y2="195" stroke="#e05da3" stroke-width="2" stroke-linecap="round"/>
    <!-- Handle highlight -->
    <rect x="24" y="120" width="12" height="100" rx="6" fill="#f9a8d4" opacity="0.5"/>
  </g>

  <!-- === ANNOTATIONS === -->

  <!-- Arrow to fork tines -->
  <line x1="100" y1="100" x2="148" y2="100" stroke="#DD195A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="20" y="95" font-family="system-ui,sans-serif" font-size="11" fill="#DD195A" font-weight="600">Afgeronde</text>
  <text x="20" y="108" font-family="system-ui,sans-serif" font-size="11" fill="#DD195A" font-weight="600">vorktanden</text>

  <!-- Arrow to spoon -->
  <line x1="300" y1="58" x2="300" y2="76" stroke="#DD195A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="300" y="54" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#DD195A" font-weight="600">Ondiepe lepel</text>

  <!-- Arrow to knife -->
  <line x1="500" y1="85" x2="452" y2="85" stroke="#DD195A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="505" y="80" font-family="system-ui,sans-serif" font-size="11" fill="#DD195A" font-weight="600">Afgerond</text>
  <text x="505" y="93" font-family="system-ui,sans-serif" font-size="11" fill="#DD195A" font-weight="600">mesblad</text>

  <!-- Arrow to handles -->
  <line x1="105" y1="260" x2="145" y2="240" stroke="#DD195A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="15" y="258" font-family="system-ui,sans-serif" font-size="11" fill="#DD195A" font-weight="600">Dikke antislip</text>
  <text x="15" y="271" font-family="system-ui,sans-serif" font-size="11" fill="#DD195A" font-weight="600">siliconen greep</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0 0 L8 4 L0 8 Z" fill="#DD195A"/>
    </marker>
  </defs>

  <!-- === VUISTGREEP ILLUSTRATION (bottom) === -->
  <!-- Small hand gripping handle -->
  <g transform="translate(340, 310)">
    <!-- Hand outline -->
    <path d="M30 0 C45 -5 65 5 70 25 C75 45 60 65 50 75 C40 85 25 80 15 65 C5 50 10 10 30 0Z" fill="#fcd9b6" stroke="#e8b88a" stroke-width="1.5"/>
    <!-- Thumb -->
    <path d="M15 30 C5 25 -5 35 0 45 C5 55 15 50 18 42" fill="#fcd9b6" stroke="#e8b88a" stroke-width="1.5"/>
    <!-- Little handle piece visible in hand -->
    <rect x="25" y="20" width="20" height="45" rx="10" fill="#60a5fa" opacity="0.7"/>
  </g>
  <text x="420" y="355" font-family="system-ui,sans-serif" font-size="12" fill="#374151" font-weight="600">Vuistgreep</text>
  <text x="420" y="370" font-family="system-ui,sans-serif" font-size="10" fill="#6b7280">Natuurlijke grip voor 1-3 jaar</text>

  <!-- === MATERIAL BADGES (bottom) === -->
  <g transform="translate(40, 400)">
    <rect width="130" height="50" rx="8" fill="#fff" stroke="#e5e7eb" stroke-width="1"/>
    <text x="65" y="22" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#374151" font-weight="700">18/10 RVS</text>
    <text x="65" y="38" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#6b7280">Roestvrij staal</text>
  </g>
  <g transform="translate(185, 400)">
    <rect width="130" height="50" rx="8" fill="#fff" stroke="#e5e7eb" stroke-width="1"/>
    <text x="65" y="22" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#374151" font-weight="700">BPA-vrij</text>
    <text x="65" y="38" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#6b7280">Food-grade siliconen</text>
  </g>
  <g transform="translate(330, 400)">
    <rect width="130" height="50" rx="8" fill="#fff" stroke="#e5e7eb" stroke-width="1"/>
    <text x="65" y="22" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#374151" font-weight="700">HACCP</text>
    <text x="65" y="38" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#6b7280">EU 1935/2004</text>
  </g>
  <g transform="translate(475, 400)">
    <rect width="110" height="50" rx="8" fill="#fff" stroke="#e5e7eb" stroke-width="1"/>
    <text x="55" y="22" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#374151" font-weight="700">70 °C</text>
    <text x="55" y="38" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#6b7280">Vaatwasser-proof</text>
  </g>

  <!-- Cookinglife watermark -->
  <text x="300" y="485" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#d1d5db">cookinglife — ergonomisch bestek kinderopvang</text>
</svg>
